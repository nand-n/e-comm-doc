name: Documentation

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate docs integrity
        run: npm run validate

      - name: Production build
        run: npm run docs:build

      - name: Verify publish directory
        run: |
          test -f docs/.vitepress/dist/index.html
          test -d docs/.vitepress/dist/delivery
          test -f docs/.vitepress/dist/delivery/openapi.yaml
          test -f docs/.vitepress/dist/delivery/openapi.html
          test -f docs/.vitepress/dist/delivery/guides/platform-integration-handbook.html
