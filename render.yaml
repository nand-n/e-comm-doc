# Render Blueprint — static VitePress docs
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: e-comm-docs
    runtime: static
    buildCommand: rm -rf node_modules && npm ci && npm run docs:build
    staticPublishPath: docs/.vitepress/dist
    envVars:
      - key: NODE_VERSION
        value: "20"
